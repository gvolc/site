<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gvolc — Open Source Backend</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
  </style>
</head>
<body class="bg-slate-950 text-slate-200">

  <!-- Hero -->
  <section class="hero py-24">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <img src="https://github.com/gvolc/.github/blob/main/9632fa8ae473d71b23a5f610533da843.jpg" 
           alt="gvolc Banner" class="w-full rounded-3xl shadow-2xl mb-12">
      
      <h1 class="text-6xl font-bold tracking-tighter mb-4">gvolc</h1>
      <p class="text-2xl text-slate-400">Open-source организация качественного backend-софта</p>
    </div>
  </section>

  <!-- Projects -->
  <section class="py-20">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12">Наши проекты</h2>
      
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- kernelMesh Card -->
        <a href="kernelMesh/" class="group bg-slate-900 border border-slate-700 rounded-3xl p-8 hover:border-cyan-500 transition-all card-hover">
          <h3 class="text-2xl font-semibold mb-3">kernelMesh</h3>
          <p class="text-slate-400">Ядро mesh-сети. Исследование и реализация.</p>
          <div class="mt-6 text-cyan-400 text-sm flex items-center gap-2">
            Перейти → 
          </div>
        </a>
      </div>
    </div>
  </section>

  <footer class="bg-black py-12 text-center text-slate-500 text-sm">
    <p>Made with ❤️ by gvolc community</p>
    <p class="mt-2">Все проекты распространяются под открытыми лицензиями</p>
  </footer>

</body>
</html>
