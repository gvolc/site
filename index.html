<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gvolc — Open Source Backend</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="icon" href="https://github.com/gvolc/.github/raw/main/9632fa8ae473d71b23a5f610533da843.jpg" type="image/jpeg">
</head>
<body class="bg-[#0f1117] text-slate-200">

    <!-- GitHub Icon - Top Left -->
  <a href="https://github.com/gvolc/kernelMesh" target="_blank" 
     class="fixed top-6 left-6 z-50 text-slate-300 hover:text-white transition-colors">
    <i class="fab fa-github text-3xl"></i>
  </a>

  <div class="max-w-6xl mx-auto px-6 pt-8">
    <!-- Banner (меньше и без сильного разделения) -->
    <img src="https://github.com/gvolc/.github/raw/main/9632fa8ae473d71b23a5f610533da843.jpg" 
         alt="gvolc Banner" class="w-full rounded-2xl mb-10">

    <h1 class="text-5xl font-bold text-center mb-2">gvolc</h1>
    <p class="text-center text-xl text-slate-400 mb-16">Open-source организация качественного backend-софта</p>

    <h2 class="text-3xl font-semibold mb-10">Проекты</h2>
    
    <div class="grid md:grid-cols-2 gap-8">
      <a href="kernelMesh/" class="card rounded-2xl p-8 group">
        <h3 class="text-3xl font-semibold mb-3">kernelMesh</h3>
        <p class="text-slate-400">Исследование и разработка ядра mesh-сети</p>
        <div class="mt-6 text-teal-400 text-sm group-hover:underline">Перейти →</div>
      </a>
    </div>

    <!-- Недавние изменения -->
    <h2 class="text-3xl font-semibold mt-24 mb-10">Недавние изменения</h2>
    <div id="commits" class="space-y-4">
      <p class="text-slate-400 text-center py-8">Загрузка последних коммитов...</p>
    </div>
  </div>

  <script>
    async function loadRecentCommits() {
      const repo = "gvolc/kernelMesh";
      const url = `https://api.github.com/repos/${repo}/commits?per_page=5`;
      
      try {
        const res = await fetch(url);
        const commits = await res.json();

        let html = '';
        commits.forEach(c => {
          const date = new Date(c.commit.author.date).toLocaleDateString('ru-RU', { 
            year: 'numeric', month: 'short', day: 'numeric' 
          });
          html += `
            <div class="card rounded-2xl p-5 commit">
              <div class="flex justify-between items-start">
                <div class="font-medium pr-4">${c.commit.message.split('\n')[0]}</div>
                <div class="text-xs text-slate-500 whitespace-nowrap">${date}</div>
              </div>
              <div class="text-sm text-slate-400 mt-1">@${c.author ? c.author.login : 'unknown'}</div>
            </div>
          `;
        });

        document.getElementById('commits').innerHTML = html || '<p class="text-slate-400">Пока нет коммитов.</p>';
      } catch (e) {
        document.getElementById('commits').innerHTML = `
          <p class="text-slate-400 text-center py-8">Не удалось загрузить последние изменения.</p>`;
      }
    }

    window.onload = loadRecentCommits;
  </script>

</body>
</html>
